<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern New Tab</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #333;
    }
    
    .button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.2s;
    }
    
    .button:hover {
      transform: scale(1.02);
    }
    
    .button:active {
      transform: scale(0.98);
    }
    
    .info {
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    
    .version {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <h2>Modern New Tab</h2>
  
  <button id="open-newtab" class="button">Open New Tab</button>
  <button id="open-settings" class="button">Settings</button>
  
  <div class="info">
    <strong>Features:</strong>
    <ul style="margin: 8px 0 0 0; padding-left: 20px;">
      <li>Beautiful backgrounds</li>
      <li>AI-powered search</li>
      <li>Quick notes</li>
      <li>Weather widget</li>
      <li>Custom links</li>
    </ul>
  </div>
  
  <div class="version">v1.0.0</div>
  
  <script src="popup.js"></script>
</body>
</html>
